<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaSupport — Process Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; display: flex; justify-content: center; padding: 20px; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="1100" height="820" viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0984E3"/><stop offset="100%" stop-color="#74b9ff"/></linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E17055"/><stop offset="100%" stop-color="#fab1a0"/></linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00B894"/><stop offset="100%" stop-color="#55efc4"/></linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#D63031"/><stop offset="100%" stop-color="#ff7675"/></linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00CEC9"/><stop offset="100%" stop-color="#81ecec"/></linearGradient>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#a29bfe"/></marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#55efc4"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ff7675"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.3"/></filter>
  </defs>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#a29bfe">NovaSupport — Process Flow</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#a0a0c0">End-to-End Agentic AI Support Ticket Lifecycle</text>

  <!-- ═══ ROW 1: User → Chat → Decision ═══ -->
  <!-- User Opens Portal -->
  <rect x="80" y="85" width="200" height="46" rx="12" fill="url(#gBlue)" filter="url(#shadow)"/>
  <text x="180" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">🖥️  User Opens Portal</text>

  <!-- Arrow: User → Chat -->
  <line x1="280" y1="108" x2="350" y2="108" stroke="#a29bfe" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- AI Chat Assistant -->
  <rect x="358" y="85" width="210" height="46" rx="12" fill="url(#gPurple)" filter="url(#shadow)"/>
  <text x="463" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">🤖  AI Chat Assistant</text>

  <!-- Arrow: Chat → Decision -->
  <line x1="568" y1="108" x2="638" y2="108" stroke="#a29bfe" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- Issue Resolved? -->
  <rect x="646" y="85" width="200" height="46" rx="12" fill="url(#gOrange)" filter="url(#shadow)"/>
  <text x="746" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">❓  Issue Resolved?</text>

  <!-- ═══ DECISION BRANCHES ═══ -->

  <!-- YES branch: Decision → right → Done -->
  <line x1="846" y1="108" x2="916" y2="108" stroke="#55efc4" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="881" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#00B894">YES</text>
  <rect x="924" y="85" width="120" height="46" rx="12" fill="url(#gGreen)" filter="url(#shadow)"/>
  <text x="984" y="113" text-anchor="middle" font-size="14" font-weight="600" fill="#0a0a1a">✅  Done</text>

  <!-- NO branch: Decision → down → Create Ticket -->
  <line x1="746" y1="131" x2="746" y2="175" stroke="#ff7675" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="766" y="158" font-size="11" font-weight="700" fill="#D63031">NO</text>
  <rect x="636" y="183" width="220" height="46" rx="12" fill="url(#gRed)" filter="url(#shadow)"/>
  <text x="746" y="211" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">📝  Create Ticket</text>

  <!-- Arrow: Create Ticket → down to Pipeline -->
  <line x1="746" y1="229" x2="746" y2="275" stroke="#a29bfe" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- ═══ PIPELINE BOX ═══ -->
  <rect x="100" y="283" width="900" height="340" rx="16" fill="none" stroke="#6C5CE7" stroke-width="2" opacity="0.7"/>
  <rect x="100" y="283" width="900" height="340" rx="16" fill="#6C5CE7" opacity="0.04"/>
  <text x="550" y="316" text-anchor="middle" font-size="17" font-weight="700" fill="#a29bfe" letter-spacing="1">⚡  AI TICKET PIPELINE</text>

  <!-- Pipeline Row 1: Tag → Priority → Route → AI Solution -->
  <!-- Auto-Tag -->
  <rect x="140" y="340" width="150" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="215" y="368" text-anchor="middle" font-size="20">🏷️</text>
  <text x="215" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Auto-Tag &amp;</text>
  <text x="215" y="403" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Categorize</text>
  <text x="215" y="418" text-anchor="middle" font-size="10" fill="#a0a0c0">Nova AI</text>

  <!-- Arrow -->
  <line x1="290" y1="382" x2="330" y2="382" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Priority Score -->
  <rect x="338" y="340" width="150" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="413" y="368" text-anchor="middle" font-size="20">📊</text>
  <text x="413" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Priority Score</text>
  <text x="413" y="418" text-anchor="middle" font-size="10" fill="#a0a0c0">1-10 Scale</text>

  <!-- Arrow -->
  <line x1="488" y1="382" x2="528" y2="382" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Route to Team -->
  <rect x="536" y="340" width="150" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="611" y="368" text-anchor="middle" font-size="20">🔀</text>
  <text x="611" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Route to Team</text>
  <text x="611" y="418" text-anchor="middle" font-size="10" fill="#a0a0c0">Routing Agent</text>

  <!-- Arrow -->
  <line x1="686" y1="382" x2="726" y2="382" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- AI Generate Solution -->
  <rect x="734" y="340" width="150" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="809" y="368" text-anchor="middle" font-size="20">💡</text>
  <text x="809" y="388" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">AI Generate</text>
  <text x="809" y="403" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Solution</text>
  <text x="809" y="418" text-anchor="middle" font-size="10" fill="#a0a0c0">Response Agent</text>

  <!-- Pipeline Row 2: Search KB → Admin → Resolve -->
  <!-- Search KB -->
  <rect x="220" y="460" width="160" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="300" y="488" text-anchor="middle" font-size="20">🔍</text>
  <text x="300" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Search KB &amp;</text>
  <text x="300" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Similar Tickets</text>
  <text x="300" y="538" text-anchor="middle" font-size="10" fill="#a0a0c0">Semantic Search</text>

  <!-- Arrow -->
  <line x1="380" y1="502" x2="430" y2="502" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Admin Reviews -->
  <rect x="438" y="460" width="160" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="518" y="488" text-anchor="middle" font-size="20">👨‍💼</text>
  <text x="518" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Admin Reviews</text>
  <text x="518" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">&amp; Responds</text>
  <text x="518" y="538" text-anchor="middle" font-size="10" fill="#a0a0c0">Admin Portal</text>

  <!-- Arrow -->
  <line x1="598" y1="502" x2="648" y2="502" stroke="#6C5CE7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Resolve & Store -->
  <rect x="656" y="460" width="160" height="85" rx="10" fill="#6C5CE7" fill-opacity="0.15" stroke="#6C5CE7" stroke-opacity="0.4"/>
  <text x="736" y="488" text-anchor="middle" font-size="20">✅</text>
  <text x="736" y="508" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">Resolve &amp; Store</text>
  <text x="736" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="#e0e0f0">in Knowledge Base</text>
  <text x="736" y="538" text-anchor="middle" font-size="10" fill="#a0a0c0">Self-Learning</text>

  <!-- ═══ Arrow: Pipeline → Email ═══ -->
  <line x1="550" y1="623" x2="550" y2="670" stroke="#a29bfe" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- Email Resolution -->
  <rect x="370" y="678" width="360" height="48" rx="12" fill="url(#gTeal)" filter="url(#shadow)"/>
  <text x="550" y="707" text-anchor="middle" font-size="14" font-weight="600" fill="#0a0a1a">📧  Email Resolution to User via SES</text>

  <!-- Footer -->
  <text x="550" y="770" text-anchor="middle" font-size="11" fill="#636e72">Powered by Amazon Nova AI · AWS Lambda · DynamoDB · Cognito · SES · Transcribe · Polly · Titan Embeddings</text>

</svg>
</body>
</html>
